name: CI

on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    working-directory: electron-app

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run typecheck
      - run: bun run lint
